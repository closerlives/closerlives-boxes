<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=300, height=270, initial-scale=1.0">
  <title>Affiliate Promo Box</title>
  <style>
    html, body {
      margin: 0; 
      padding: 0; 
      width: 300px; 
      height: 270px; 
      overflow: hidden; 
      background: transparent; 
      box-sizing: border-box;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    .box {
      width: 300px; 
      height: 270px; 
      border-radius: 10px; 
      overflow: hidden; 
      background-color: #ffffff; 
      font-family: Lato, Arial, sans-serif;
      border: 2px solid #1a1a40;
      display: flex;
      flex-direction: column;
    }

    .promo-banner {
      background-color: #1a1a40;
      color: #ffffff;
      text-align: center;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 6px 0;
      flex-shrink: 0;
      width: 100%;
    }

    .image-wrapper {
      width: 100%; 
      flex-grow: 1;
      overflow: hidden;
    }

    .image-wrapper a {
      display: block; 
      width: 100%; 
      height: 100%; 
    }

    .image-wrapper img {
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block; 
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="promo-banner">Affiliate Promotion</div>
    <div class="image-wrapper">
      <a href="https://go.nordvpn.net/SHAxh" target="_blank" rel="noopener sponsored">
        <img src="https://static.wixstatic.com/media/971500_b989aaefe6394845b52e971b0c56fac9~mv2.webp" alt="NordVPN promo banner with a dark blue background featuring the NordVPN logo. Text reads: Avoid scam, phishing, and malware. Get 75% off + 3 months extra with a red Get the Deal button.">
      </a>
    </div>
  </div>
</body>
</html>
