<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=300, height=270, initial-scale=1.0">
  <title>Affiliate Promo Box</title>
  <style>
    html, body {
      margin: 0; 
      padding: 0; 
      width: 300px; 
      height: 270px; 
      overflow: hidden; 
      background: transparent; 
      box-sizing: border-box;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    .box {
      width: 300px; 
      height: 270px; 
      border-radius: 10px; 
      overflow: hidden; 
      background-color: #ffffff; 
      font-family: Lato, Arial, sans-serif;
      border: 2px solid #1a1a40;
      display: flex;
      flex-direction: column;
    }

    .promo-banner {
      background-color: #1a1a40;
      color: #ffffff;
      text-align: center;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 6px 0;
      flex-shrink: 0;
      width: 100%;
    }

    .image-wrapper {
      width: 100%; 
      flex-grow: 1;
      overflow: hidden;
    }

    .image-wrapper a {
      display: block; 
      width: 100%; 
      height: 100%; 
    }

    .image-wrapper img {
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block; 
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="promo-banner">Affiliate Promotion</div>
    <div class="image-wrapper">
      <a href="https://go.saily.site/aff_c?offer_id=101&aff_id=7919" target="_blank" rel="noopener sponsored" aria-label="Get affordable global data with Saily eSIM and stay connected while travelling">
        <img src="https://static.wixstatic.com/media/971500_a1f0c73c32e14d61b1315e4718316bac~mv2.png" alt="Saily eSIM banner promoting affordable data plans, featuring a person holding a phone and a 'Get Saily' button.">
      </a>
    </div>
  </div>
</body>
</html>
