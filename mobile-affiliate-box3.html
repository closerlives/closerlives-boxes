<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Affiliate Promo Box</title>
  <style>
    html, body {
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background: transparent; 
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    .box {
      width: 300px; 
      height: 270px; 
      border-radius: 10px; 
      overflow: hidden; 
      background-color: #ffffff; 
      font-family: Lato, Arial, sans-serif;
      border: 2px solid #1a1a40;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .promo-banner {
      background-color: #1a1a40;
      color: #ffffff;
      text-align: center;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 6px 0;
      flex-shrink: 0;
      width: 100%;
    }

    .image-wrapper {
      width: 100%; 
      flex-grow: 1;
      overflow: hidden;
    }

    .image-wrapper a {
      display: block; 
      width: 100%; 
      height: 100%; 
    }

    .image-wrapper img {
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block; 
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="promo-banner">Affiliate Promotion</div>
    <div class="image-wrapper">
      <a href="https://www.justtravelcover.com/?tracking=766a0fc9-1372-4fe1-9dfb-e7ac1ca05a2f" target="_blank" rel="noopener sponsored">
        <img src="https://static.wixstatic.com/media/971500_605dabd86d2140af91eff0e091d3fbff~mv2.png" alt="A promotional banner for the Just Travel Cover Summer Sale featuring a person relaxing in a pool overlooking a tropical landscape, offering 15% off UK travel insurance.">
      </a>
    </div>
  </div>
</body>
</html>
