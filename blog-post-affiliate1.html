<!-- Reusable Image Promo Box (Responsive) -->
<section aria-label="Affiliate Promotion" role="region" style="width:100%;">

  <style>
    html, body { margin:0; padding:0; }
    * { box-sizing: border-box; }
  </style>

  <div style="
    width:100%;
    max-width:320px;
    margin:0 auto;
    font-family:Lato, Arial, sans-serif;
    text-align:center;
  ">

    <!-- Label -->
    <div style="
      font-size:16px;
      font-weight:bold;
      color:#666;
      margin-bottom:5px;
      text-transform:uppercase;
    ">
      Affiliate Promotion
    </div>

    <!-- Clickable promo -->
    <a href="https://go.nordpass.io/SHB73"
       target="_blank"
       rel="noopener sponsored"
       aria-label="Get NordPass with 50% off - Get The Deal"
       style="
         display:block;
         width:100%;
         max-width:300px;
         margin:0 auto;
         background:#fff;
         border:2px solid #60C3BE;
         border-radius:10px;
         overflow:hidden;
         text-decoration:none;
       ">

      <img src="https://static.wixstatic.com/media/971500_5155cc1fd63b4e2a8c061933679a72cb~mv2.webp"
           alt="NordPass special offer banner featuring a person looking at a phone, text Get NordPass with 50% off and a Get The Deal button."
           style="
             width:100%;
             height:auto;
             display:block;
           ">
    </a>

  </div>
</section>
