<!-- Reusable Image Promo Box (Responsive) -->
<section aria-label="Affiliate Promotion" role="region" style="width:100%;">

  <style>
    html, body { margin:0; padding:0; }
    * { box-sizing: border-box; }
  </style>

  <div style="
    width:100%;
    max-width:320px;
    margin:0 auto;
    font-family:Lato, Arial, sans-serif;
    text-align:center;
  ">

    <!-- Label -->
    <div style="
      font-size:16px;
      font-weight:bold;
      color:#666;
      margin-bottom:5px;
      text-transform:uppercase;
    ">
      Affiliate Promotion
    </div>

    <!-- Clickable promo -->
    <a href="https://go.nordvpn.net/SHAxh"
       rel="noopener sponsored"
       aria-label="Get 75% off NordVPN plus 3 months extra"
       style="
         display:block;
         width:100%;
         max-width:300px;
         margin:0 auto;
         background:#fff;
         border:2px solid #000000;
         border-radius:10px;
         overflow:hidden;
         text-decoration:none;
       ">

      <img src="https://static.wixstatic.com/media/971500_b989aaefe6394845b52e971b0c56fac9~mv2.webp"
           alt="NordVPN promo banner with a dark blue background featuring the NordVPN logo. Text reads: Avoid scam, phishing, and malware. Get 75% off + 3 months extra with a red Get the Deal button."
           style="
             width:100%;
             height:auto;
             display:block;
           ">
    </a>

  </div>
</section>
